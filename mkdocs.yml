site_name: CoRE Stack Documentation
site_description: Community Resource Planning Stack - open geospatial infrastructure for public data access, computation pipelines, and grounded planning.
site_url: https://docs.core-stack.org
copyright: CoRE Stack; 2026

repo_name: core-stack-org/core-stack-docs
repo_url: https://github.com/core-stack-org/core-stack-docs
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.instant.preview
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.png
  favicon: assets/logo.png

extra:
  generator: false
  offline_mode: !ENV [MKDOCS_OFFLINE, false]
  giscus:
    repo: core-stack-org/core-stack-docs
    repo_id: ""
    category: General
    category_id: ""
    mapping: pathname
    strict: "0"
    reactions_enabled: "1"
    emit_metadata: "0"
    input_position: bottom
    lang: en
    loading: lazy
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/core-stack-org
      name: Build CoRE Stack with us
    - icon: fontawesome/brands/discord
      link: https://discord.gg/PSkZX4hvWx
      name: Join discussions on Discord
    - icon: fontawesome/solid/globe
      link: https://core-stack.org
      name: CoRE Stack website
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/company/core-stack
      name: Connect on LinkedIn

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - blog
  - social
  - offline
  - mermaid2:
      arguments:
        theme: neutral

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: On this page
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.blocks.caption

